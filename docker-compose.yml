services:
  # 前端 (Nginx)
  web:
    build: .
    ports:
      - "3000:80"
    depends_on:
      - pocketbase
    restart: unless-stopped

  # PocketBase 数据库
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    volumes:
      - pb_data:/pb/pb_data
    restart: unless-stopped
    # 不暴露端口，仅 Nginx 内部访问

volumes:
  pb_data:
